# ─────────────────────────────────────────
# Nginx 설정 — GW 자동화 챗봇
# HTTPS 역방향 프록시 + 보안 헤더
# ─────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 로그 형식
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # 보안: nginx 버전 숨기기
    server_tokens off;

    # 업로드 파일 크기 제한 (20MB)
    client_max_body_size 20M;

    # ─────────────────────────────────────────
    # HTTP → HTTPS 리다이렉트
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;   # 실제 도메인으로 변경 필요

        # Let's Encrypt ACME 챌린지 (certbot용)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 나머지는 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────
    # HTTPS (443) — 역방향 프록시
    # ─────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;   # 실제 도메인으로 변경 필요

        # SSL 인증서 (Let's Encrypt 또는 자체 서명)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL 강화 설정
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # 보안 헤더
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # ── 챗봇 웹 UI ──
        location / {
            proxy_pass         http://app:51749;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";  # WebSocket 지원

            # 타임아웃 (자동화 작업이 오래 걸릴 수 있음)
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_connect_timeout 10s;
        }

        # ── 헬스체크 ──
        location /health {
            proxy_pass http://app:51749/health;
            access_log off;
        }
    }
}

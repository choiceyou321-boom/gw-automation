<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사용자 관리 - GW 자동화</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .admin-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px;
      min-height: 100vh;
    }
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .admin-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .admin-header .back-btn {
      padding: 8px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .admin-header .back-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    /* 탭 */
    .tab-bar {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    /* 공통 테이블 */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .data-table th,
    .data-table td {
      padding: 12px 14px;
      text-align: left;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .data-table th {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .data-table td { color: var(--text-primary); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg-hover); }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-admin { background: rgba(124, 106, 247, 0.2); color: var(--accent); }
    .badge-incomplete { background: rgba(255, 165, 0, 0.15); color: #ffa500; }
    .badge-type {
      background: rgba(80, 180, 255, 0.15);
      color: #50b4ff;
    }
    .delete-btn {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid rgba(255, 107, 107, 0.4);
      border-radius: var(--radius-sm);
      color: #ff6b6b;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: rgba(255, 107, 107, 0.15); border-color: #ff6b6b; }
    .delete-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .role-btn {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid rgba(124, 106, 247, 0.4);
      border-radius: var(--radius-sm);
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .role-btn:hover { background: rgba(124, 106, 247, 0.15); border-color: var(--accent); }
    .role-btn.revoke {
      border-color: rgba(255, 165, 0, 0.4);
      color: #ffa500;
    }
    .role-btn.revoke:hover { background: rgba(255, 165, 0, 0.15); border-color: #ffa500; }
    .role-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .edit-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      padding: 4px 8px;
      font-size: 12px;
      width: 80px;
      font-family: var(--font);
    }
    .edit-input:focus { border-color: var(--accent); outline: none; }
    .save-btn {
      padding: 4px 10px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 11px;
      cursor: pointer;
      margin-left: 4px;
    }
    .save-btn:hover { background: var(--accent-hover); }
    .meta-row {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .msg-cell {
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 13px;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }
    .toast.error { border-color: rgba(255, 107, 107, 0.5); color: #ff6b6b; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    /* GW 검증 배지 */
    .badge-valid { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .badge-invalid { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .badge-error { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .badge-skipped { background: rgba(156, 163, 175, 0.2); color: #9ca3af; }
    .validate-btn {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid rgba(34, 197, 94, 0.4);
      border-radius: var(--radius-sm);
      color: #22c55e;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .validate-btn:hover { background: rgba(34, 197, 94, 0.15); border-color: #22c55e; }
    .validate-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .validate-all-btn {
      padding: 6px 14px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.4);
      border-radius: var(--radius-sm);
      color: #22c55e;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .validate-all-btn:hover { background: rgba(34, 197, 94, 0.2); border-color: #22c55e; }
    .validate-all-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .validate-progress {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .validate-progress.active { display: flex; }
    .progress-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
      min-width: 120px;
    }
    .progress-bar-fill {
      height: 100%;
      background: #22c55e;
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }
    .spinner-sm {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(124, 106, 247, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .delete-invalid-btn {
      padding: 6px 14px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: var(--radius-sm);
      color: #ef4444;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
    .delete-invalid-btn:hover { background: rgba(239, 68, 68, 0.2); }
    @media (max-width: 768px) {
      .admin-container { padding: 20px 12px; }
      .data-table th, .data-table td { padding: 8px 10px; font-size: 12px; }
      .edit-input { width: 60px; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1>관리자 페이지</h1>
      <a href="/" class="back-btn">채팅으로 돌아가기</a>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="users">사용자 관리</button>
      <button class="tab-btn" data-tab="unsupported">미지원 요청</button>
    </div>

    <!-- 탭1: 사용자 관리 -->
    <div class="tab-pane active" id="tab-users">
      <div class="meta-row">
        <span id="userCount"></span>
        <button class="validate-all-btn" id="validateAllBtn">전체 GW 검증</button>
        <button class="delete-invalid-btn" id="deleteInvalidBtn">무효 유저 삭제</button>
        <div class="validate-progress" id="validateProgress">
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
          <span id="progressText">0/0</span>
        </div>
      </div>
      <div id="usersContent">
        <div class="loading">불러오는 중...</div>
      </div>
    </div>

    <!-- 탭2: 미지원 요청 -->
    <div class="tab-pane" id="tab-unsupported">
      <div class="meta-row">
        <span id="unsupportedCount"></span>
        <button class="delete-btn" id="clearAllBtn" style="margin-left:auto;">전체 삭제</button>
      </div>
      <div id="unsupportedContent">
        <div class="loading">불러오는 중...</div>
      </div>
    </div>
  </div>

  <script>
    const BASE = '';
    let currentAdminId = null;  // 현재 로그인한 관리자 ID

    // CSRF 토큰 유틸리티
    function getCsrfToken() {
      const match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
      return match ? decodeURIComponent(match[1]) : '';
    }
    function safeFetch(url, options = {}) {
      const method = (options.method || 'GET').toUpperCase();
      if (method !== 'GET' && method !== 'HEAD') {
        options.headers = options.headers || {};
        options.headers['X-CSRF-Token'] = getCsrfToken();
      }
      options.credentials = 'same-origin';
      return fetch(url, options);
    }

    // HTML 특수문자 이스케이프 헬퍼 (XSS 방지)
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s == null ? '' : s);
      return d.innerHTML;
    }

    // ── 탭 전환 ──
    document.querySelector('.tab-bar').addEventListener('click', function(e) {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
      if (tab === 'unsupported') loadUnsupported();
    });

    // ── 사용자 관리 ──
    async function loadUsers() {
      try {
        // 현재 로그인 관리자 ID 가져오기
        if (!currentAdminId) {
          const meRes = await fetch(`${BASE}/auth/me`, { credentials: 'same-origin' });
          if (meRes.ok) {
            const meData = await meRes.json();
            currentAdminId = meData.user.gw_id;
          }
        }
        const res = await fetch(`${BASE}/admin/users`, { credentials: 'same-origin' });
        if (res.status === 401) { location.href = '/'; return; }
        if (res.status === 403) {
          document.getElementById('usersContent').innerHTML =
            '<div class="loading" style="color:#ff6b6b;">관리자 권한이 필요합니다.</div>';
          return;
        }
        const data = await res.json();
        // 본인 여부 플래그 추가
        data.users.forEach(u => { u.is_self = (u.gw_id === currentAdminId); });
        renderUsers(data.users);
      } catch (e) {
        document.getElementById('usersContent').innerHTML =
          '<div class="loading" style="color:#ff6b6b;">서버 연결 실패</div>';
      }
    }

    let invalidUsers = [];  // 검증 실패 유저 목록

    function renderUsers(users) {
      document.getElementById('userCount').textContent = `총 ${users.length}명`;
      const html = `
        <table class="data-table">
          <thead>
            <tr>
              <th>GW ID</th>
              <th>이름</th>
              <th>직급</th>
              <th>empSeq</th>
              <th>deptSeq</th>
              <th>가입일</th>
              <th>권한</th>
              <th>GW 검증</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody>
            ${users.map(u => `
              <tr id="row-${esc(u.gw_id)}">
                <td>
                  ${esc(u.gw_id)}
                  ${u.is_admin ? ' <span class="badge badge-admin">관리자</span>' : ''}
                </td>
                <td>${esc(u.name)}</td>
                <td>${esc(u.position || '-')}</td>
                <td>
                  <input class="edit-input" id="emp-${esc(u.gw_id)}" value="${esc(u.emp_seq || '')}" placeholder="미설정" />
                  <button class="save-btn" data-gw-id="${esc(u.gw_id)}">저장</button>
                  ${!u.emp_seq ? '<span class="badge badge-incomplete">미설정</span>' : ''}
                </td>
                <td>${esc(u.dept_seq || '-')}</td>
                <td>${esc(u.created_at ? u.created_at.split('T')[0] : '-')}</td>
                <td>
                  ${u.is_self
                    ? '<span class="badge badge-admin">본인</span>'
                    : u.is_admin
                      ? `<button class="role-btn revoke" data-role-id="${esc(u.gw_id)}" data-role-name="${esc(u.name)}">권한 해제</button>`
                      : `<button class="role-btn" data-role-id="${esc(u.gw_id)}" data-role-name="${esc(u.name)}">관리자 부여</button>`
                  }
                </td>
                <td id="vstat-${esc(u.gw_id)}">
                  ${u.is_admin
                    ? '<span class="badge badge-skipped">건너뜀</span>'
                    : `<button class="validate-btn" data-validate-id="${esc(u.gw_id)}">검증</button>`
                  }
                </td>
                <td>
                  ${u.is_self
                    ? '<button class="delete-btn" disabled>삭제 불가</button>'
                    : `<button class="delete-btn" data-gw-id="${esc(u.gw_id)}" data-name="${esc(u.name)}">삭제</button>`
                  }
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('usersContent').innerHTML = html;

      document.getElementById('usersContent').addEventListener('click', function(e) {
        const deleteBtn = e.target.closest('.delete-btn[data-gw-id]');
        if (deleteBtn) { deleteUser(deleteBtn.dataset.gwId, deleteBtn.dataset.name); return; }
        const saveBtn = e.target.closest('.save-btn[data-gw-id]');
        if (saveBtn) { saveProfile(saveBtn.dataset.gwId); return; }
        const roleBtn = e.target.closest('.role-btn[data-role-id]');
        if (roleBtn) { toggleRole(roleBtn.dataset.roleId, roleBtn.dataset.roleName, roleBtn.classList.contains('revoke')); return; }
        const valBtn = e.target.closest('.validate-btn[data-validate-id]');
        if (valBtn) validateUser(valBtn.dataset.validateId);
      });
    }

    async function toggleRole(gwId, name, isRevoke) {
      const action = isRevoke ? '해제' : '부여';
      if (!confirm(`"${name}" (${gwId}) 사용자의 관리자 권한을 ${action}하시겠습니까?`)) return;
      try {
        const res = await safeFetch(`${BASE}/admin/users/${gwId}/role`, {
          method: 'PUT',
        });
        const data = await res.json();
        if (res.ok) { showToast(data.message || `관리자 권한 ${action} 완료`); loadUsers(); }
        else showToast(data.detail || `권한 ${action} 실패`, true);
      } catch (e) { showToast('서버 오류', true); }
    }

    async function deleteUser(gwId, name) {
      if (!confirm(`"${name}" (${gwId}) 사용자를 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
      try {
        const res = await safeFetch(`${BASE}/admin/users/${gwId}`, { method: 'DELETE' });
        const data = await res.json();
        if (res.ok) { showToast(data.message || '삭제 완료'); loadUsers(); }
        else showToast(data.detail || '삭제 실패', true);
      } catch (e) { showToast('서버 오류', true); }
    }

    async function saveProfile(gwId) {
      const empSeq = document.getElementById(`emp-${gwId}`).value.trim();
      try {
        const res = await safeFetch(`${BASE}/admin/users/${gwId}/profile`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ emp_seq: empSeq }),
        });
        const data = await res.json();
        if (res.ok) { showToast(`${gwId} empSeq 저장 완료`); loadUsers(); }
        else showToast(data.detail || '저장 실패', true);
      } catch (e) { showToast('서버 오류', true); }
    }

    // ── 미지원 요청 ──
    async function loadUnsupported() {
      document.getElementById('unsupportedContent').innerHTML =
        '<div class="loading">불러오는 중...</div>';
      try {
        const res = await fetch(`${BASE}/admin/unsupported-requests`, { credentials: 'same-origin' });
        if (!res.ok) { throw new Error(res.status); }
        const data = await res.json();
        renderUnsupported(data.items, data.total);
      } catch (e) {
        document.getElementById('unsupportedContent').innerHTML =
          '<div class="loading" style="color:#ff6b6b;">불러오기 실패</div>';
      }
    }

    function renderUnsupported(items, total) {
      document.getElementById('unsupportedCount').textContent =
        `총 ${total}건`;

      if (!items.length) {
        document.getElementById('unsupportedContent').innerHTML =
          '<div class="loading">미지원 요청이 없습니다.</div>';
        return;
      }

      const html = `
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>사용자</th>
              <th>유형</th>
              <th>요청 내용</th>
              <th>상세</th>
              <th>일시</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(r => `
              <tr id="unsup-${esc(r.id)}">
                <td style="color:var(--text-muted)">${esc(r.id)}</td>
                <td>${esc(r.gw_id)}</td>
                <td><span class="badge badge-type">${esc(r.request_type)}</span></td>
                <td class="msg-cell" title="${esc(r.user_message)}">${esc(r.user_message)}</td>
                <td class="msg-cell" title="${esc(r.detail)}">${esc(r.detail || '-')}</td>
                <td style="white-space:nowrap">${esc(r.created_at ? r.created_at.replace('T', ' ').slice(0, 16) : '-')}</td>
                <td>
                  <button class="delete-btn" data-req-id="${esc(r.id)}">삭제</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('unsupportedContent').innerHTML = html;

      document.getElementById('unsupportedContent').addEventListener('click', function(e) {
        const btn = e.target.closest('.delete-btn[data-req-id]');
        if (btn) deleteUnsupported(Number(btn.dataset.reqId));
      });
    }

    async function deleteUnsupported(id) {
      try {
        const res = await safeFetch(`${BASE}/admin/unsupported-requests/${id}`, {
          method: 'DELETE',
        });
        const data = await res.json();
        if (res.ok) { showToast('삭제 완료'); loadUnsupported(); }
        else showToast(data.detail || '삭제 실패', true);
      } catch (e) { showToast('서버 오류', true); }
    }

    document.getElementById('clearAllBtn').addEventListener('click', async function() {
      if (!confirm('미지원 요청 전체를 삭제하시겠습니까?')) return;
      try {
        const res = await fetch(`${BASE}/admin/unsupported-requests`, { credentials: 'same-origin' });
        const data = await res.json();
        const ids = (data.items || []).map(r => r.id);
        await Promise.all(ids.map(id =>
          safeFetch(`${BASE}/admin/unsupported-requests/${id}`, { method: 'DELETE' })
        ));
        showToast(`${ids.length}건 삭제 완료`);
        loadUnsupported();
      } catch (e) { showToast('서버 오류', true); }
    });

    // ── 공통 토스트 ──
    function showToast(msg, isError = false) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const el = document.createElement('div');
      el.className = `toast${isError ? ' error' : ''}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // ── GW 검증 ──
    function setVstatBadge(gwId, status, error) {
      const el = document.getElementById(`vstat-${gwId}`);
      if (!el) return;
      const labels = { valid: '✓ 유효', invalid: '✗ 무효', error: '⚠ 오류', skipped: '건너뜀', checking: '검증 중…' };
      const cls = `badge badge-${status}`;
      const title = error ? ` title="${esc(error)}"` : '';
      if (status === 'checking') {
        el.innerHTML = `<span class="spinner-sm"></span> <span style="font-size:12px;color:var(--text-muted)">검증 중…</span>`;
      } else {
        el.innerHTML = `<span class="${cls}"${title}>${labels[status] || status}</span>`;
      }
    }

    async function validateUser(gwId) {
      setVstatBadge(gwId, 'checking');
      try {
        const res = await safeFetch(`${BASE}/admin/users/${gwId}/validate`, { method: 'POST' });
        const data = await res.json();
        if (data.valid) {
          setVstatBadge(gwId, 'valid');
        } else {
          setVstatBadge(gwId, 'invalid', data.error);
        }
      } catch (e) {
        setVstatBadge(gwId, 'error', '서버 연결 실패');
      }
    }

    document.getElementById('validateAllBtn').addEventListener('click', function() {
      const btn = this;
      if (btn.disabled) return;
      if (!confirm('전체 유저의 GW 자격증명을 검증하시겠습니까?\n(관리자 계정은 자동 건너뜁니다)\n\n검증에 수 분이 소요될 수 있습니다.')) return;

      btn.disabled = true;
      btn.textContent = '검증 중…';
      invalidUsers = [];
      document.getElementById('deleteInvalidBtn').style.display = 'none';

      const progress = document.getElementById('validateProgress');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');
      progress.classList.add('active');

      // 전체 유저 수 (관리자 제외) 사전 계산
      const rows = document.querySelectorAll('[id^="vstat-"]');
      const totalTargets = document.querySelectorAll('.validate-btn[data-validate-id]').length;
      let processed = 0;

      // SSE 연결
      const csrfToken = getCsrfToken();
      fetch(`${BASE}/admin/validate-all`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'X-CSRF-Token': csrfToken },
      }).then(response => {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        function readStream() {
          reader.read().then(({ done, value }) => {
            if (done) {
              finishValidation();
              return;
            }
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              try {
                const evt = JSON.parse(line.slice(6));
                if (evt.type === 'summary') {
                  progressText.textContent = `완료 — 유효 ${evt.valid}, 무효 ${evt.invalid}, 오류 ${evt.error}, 건너뜀 ${evt.skipped}`;
                  progressFill.style.width = '100%';
                  showToast(`검증 완료: 유효 ${evt.valid}명, 무효 ${evt.invalid}명, 오류 ${evt.error}명`);
                } else {
                  setVstatBadge(evt.gw_id, evt.status, evt.error);
                  if (evt.status !== 'skipped') {
                    processed++;
                    const pct = totalTargets > 0 ? Math.round(processed / totalTargets * 100) : 0;
                    progressFill.style.width = pct + '%';
                    progressText.textContent = `${processed}/${totalTargets}`;
                  }
                  if (evt.status === 'invalid') {
                    invalidUsers.push(evt.gw_id);
                  }
                }
              } catch (e) { /* 파싱 오류 무시 */ }
            }
            readStream();
          }).catch(() => finishValidation());
        }
        readStream();
      }).catch(() => {
        showToast('검증 요청 실패', true);
        finishValidation();
      });

      function finishValidation() {
        btn.disabled = false;
        btn.textContent = '전체 GW 검증';
        if (invalidUsers.length > 0) {
          const delBtn = document.getElementById('deleteInvalidBtn');
          delBtn.style.display = 'inline-block';
          delBtn.textContent = `무효 유저 삭제 (${invalidUsers.length}명)`;
        }
      }
    });

    document.getElementById('deleteInvalidBtn').addEventListener('click', async function() {
      if (!invalidUsers.length) return;
      if (!confirm(`무효 유저 ${invalidUsers.length}명을 삭제하시겠습니까?\n\n${invalidUsers.join(', ')}\n\n이 작업은 되돌릴 수 없습니다.`)) return;

      let deleted = 0;
      for (const gwId of invalidUsers) {
        try {
          const res = await safeFetch(`${BASE}/admin/users/${gwId}`, { method: 'DELETE' });
          if (res.ok) deleted++;
        } catch (e) { /* 개별 실패 무시 */ }
      }
      showToast(`${deleted}명 삭제 완료`);
      invalidUsers = [];
      this.style.display = 'none';
      loadUsers();
    });

    loadUsers();
  </script>
</body>
</html>

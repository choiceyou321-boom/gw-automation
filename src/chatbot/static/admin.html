<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사용자 관리 - GW 자동화</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .admin-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px;
      min-height: 100vh;
    }
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .admin-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .admin-header .back-btn {
      padding: 8px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .admin-header .back-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    /* 탭 */
    .tab-bar {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    /* 공통 테이블 */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .data-table th,
    .data-table td {
      padding: 12px 14px;
      text-align: left;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .data-table th {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .data-table td { color: var(--text-primary); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg-hover); }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-admin { background: rgba(124, 106, 247, 0.2); color: var(--accent); }
    .badge-incomplete { background: rgba(255, 165, 0, 0.15); color: #ffa500; }
    .badge-type {
      background: rgba(80, 180, 255, 0.15);
      color: #50b4ff;
    }
    .delete-btn {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid rgba(255, 107, 107, 0.4);
      border-radius: var(--radius-sm);
      color: #ff6b6b;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: rgba(255, 107, 107, 0.15); border-color: #ff6b6b; }
    .delete-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .edit-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      padding: 4px 8px;
      font-size: 12px;
      width: 80px;
      font-family: var(--font);
    }
    .edit-input:focus { border-color: var(--accent); outline: none; }
    .save-btn {
      padding: 4px 10px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 11px;
      cursor: pointer;
      margin-left: 4px;
    }
    .save-btn:hover { background: var(--accent-hover); }
    .meta-row {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .msg-cell {
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 13px;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }
    .toast.error { border-color: rgba(255, 107, 107, 0.5); color: #ff6b6b; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    /* 트래픽 탭 */
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      min-width: 160px;
      flex: 1;
    }
    .stat-card .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .stat-card .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .stat-card .stat-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .tunnel-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      flex: 1;
    }
    .tunnel-card .tunnel-url {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      word-break: break-all;
      margin-bottom: 6px;
    }
    .tunnel-card .tunnel-meta {
      font-size: 12px;
      color: var(--text-muted);
    }
    .tunnel-online { color: #4caf50; font-weight: 600; }
    .status-2xx { color: #4caf50; }
    .status-3xx { color: #ffa500; }
    .status-4xx { color: #ff6b6b; }
    .status-5xx { color: #ff6b6b; font-weight: 700; }
    .refresh-btn {
      padding: 6px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    @media (max-width: 768px) {
      .admin-container { padding: 20px 12px; }
      .data-table th, .data-table td { padding: 8px 10px; font-size: 12px; }
      .edit-input { width: 60px; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1>관리자 페이지</h1>
      <a href="/" class="back-btn">채팅으로 돌아가기</a>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="users">사용자 관리</button>
      <button class="tab-btn" data-tab="unsupported">미지원 요청</button>
      <button class="tab-btn" data-tab="traffic">외부 트래픽</button>
    </div>

    <!-- 탭1: 사용자 관리 -->
    <div class="tab-pane active" id="tab-users">
      <div class="meta-row">
        <span id="userCount"></span>
      </div>
      <div id="usersContent">
        <div class="loading">불러오는 중...</div>
      </div>
    </div>

    <!-- 탭3: 외부 트래픽 -->
    <div class="tab-pane" id="tab-traffic">
      <div class="meta-row" id="trafficMeta"></div>

      <!-- 터널 상태 카드 -->
      <div id="tunnelCards" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;"></div>

      <!-- 요약 카드 -->
      <div id="trafficSummary" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;"></div>

      <!-- 요청 목록 -->
      <div id="trafficContent"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- 탭2: 미지원 요청 -->
    <div class="tab-pane" id="tab-unsupported">
      <div class="meta-row">
        <span id="unsupportedCount"></span>
        <button class="delete-btn" id="clearAllBtn" style="margin-left:auto;">전체 삭제</button>
      </div>
      <div id="unsupportedContent">
        <div class="loading">불러오는 중...</div>
      </div>
    </div>
  </div>

  <script>
    const BASE = '';

    // HTML 특수문자 이스케이프 헬퍼 (XSS 방지)
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s == null ? '' : s);
      return d.innerHTML;
    }

    // ── 탭 전환 ──
    document.querySelector('.tab-bar').addEventListener('click', function(e) {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
      if (tab === 'unsupported') loadUnsupported();
      if (tab === 'traffic') loadTraffic();
    });

    // ── 사용자 관리 ──
    async function loadUsers() {
      try {
        const res = await fetch(`${BASE}/admin/users`, { credentials: 'same-origin' });
        if (res.status === 401) { location.href = '/'; return; }
        if (res.status === 403) {
          document.getElementById('usersContent').innerHTML =
            '<div class="loading" style="color:#ff6b6b;">관리자 권한이 필요합니다.</div>';
          return;
        }
        const data = await res.json();
        renderUsers(data.users);
      } catch (e) {
        document.getElementById('usersContent').innerHTML =
          '<div class="loading" style="color:#ff6b6b;">서버 연결 실패</div>';
      }
    }

    function renderUsers(users) {
      document.getElementById('userCount').textContent = `총 ${users.length}명`;
      const html = `
        <table class="data-table">
          <thead>
            <tr>
              <th>GW ID</th>
              <th>이름</th>
              <th>직급</th>
              <th>empSeq</th>
              <th>deptSeq</th>
              <th>가입일</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody>
            ${users.map(u => `
              <tr id="row-${esc(u.gw_id)}">
                <td>
                  ${esc(u.gw_id)}
                  ${u.is_admin ? ' <span class="badge badge-admin">관리자</span>' : ''}
                </td>
                <td>${esc(u.name)}</td>
                <td>${esc(u.position || '-')}</td>
                <td>
                  <input class="edit-input" id="emp-${esc(u.gw_id)}" value="${esc(u.emp_seq || '')}" placeholder="미설정" />
                  <button class="save-btn" data-gw-id="${esc(u.gw_id)}">저장</button>
                  ${!u.emp_seq ? '<span class="badge badge-incomplete">미설정</span>' : ''}
                </td>
                <td>${esc(u.dept_seq || '-')}</td>
                <td>${esc(u.created_at ? u.created_at.split('T')[0] : '-')}</td>
                <td>
                  ${u.is_admin
                    ? '<button class="delete-btn" disabled>삭제 불가</button>'
                    : `<button class="delete-btn" data-gw-id="${esc(u.gw_id)}" data-name="${esc(u.name)}">삭제</button>`
                  }
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('usersContent').innerHTML = html;

      document.getElementById('usersContent').addEventListener('click', function(e) {
        const deleteBtn = e.target.closest('.delete-btn[data-gw-id]');
        if (deleteBtn) { deleteUser(deleteBtn.dataset.gwId, deleteBtn.dataset.name); return; }
        const saveBtn = e.target.closest('.save-btn[data-gw-id]');
        if (saveBtn) saveProfile(saveBtn.dataset.gwId);
      });
    }

    async function deleteUser(gwId, name) {
      if (!confirm(`"${name}" (${gwId}) 사용자를 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
      try {
        const res = await fetch(`${BASE}/admin/users/${gwId}`, { method: 'DELETE', credentials: 'same-origin' });
        const data = await res.json();
        if (res.ok) { showToast(data.message || '삭제 완료'); loadUsers(); }
        else showToast(data.detail || '삭제 실패', true);
      } catch (e) { showToast('서버 오류', true); }
    }

    async function saveProfile(gwId) {
      const empSeq = document.getElementById(`emp-${gwId}`).value.trim();
      try {
        const res = await fetch(`${BASE}/admin/users/${gwId}/profile`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ emp_seq: empSeq }),
          credentials: 'same-origin',
        });
        const data = await res.json();
        if (res.ok) { showToast(`${gwId} empSeq 저장 완료`); loadUsers(); }
        else showToast(data.detail || '저장 실패', true);
      } catch (e) { showToast('서버 오류', true); }
    }

    // ── 미지원 요청 ──
    async function loadUnsupported() {
      document.getElementById('unsupportedContent').innerHTML =
        '<div class="loading">불러오는 중...</div>';
      try {
        const res = await fetch(`${BASE}/admin/unsupported-requests`, { credentials: 'same-origin' });
        if (!res.ok) { throw new Error(res.status); }
        const data = await res.json();
        renderUnsupported(data.items, data.total);
      } catch (e) {
        document.getElementById('unsupportedContent').innerHTML =
          '<div class="loading" style="color:#ff6b6b;">불러오기 실패</div>';
      }
    }

    function renderUnsupported(items, total) {
      document.getElementById('unsupportedCount').textContent =
        `총 ${total}건`;

      if (!items.length) {
        document.getElementById('unsupportedContent').innerHTML =
          '<div class="loading">미지원 요청이 없습니다.</div>';
        return;
      }

      const html = `
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>사용자</th>
              <th>유형</th>
              <th>요청 내용</th>
              <th>상세</th>
              <th>일시</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(r => `
              <tr id="unsup-${esc(r.id)}">
                <td style="color:var(--text-muted)">${esc(r.id)}</td>
                <td>${esc(r.gw_id)}</td>
                <td><span class="badge badge-type">${esc(r.request_type)}</span></td>
                <td class="msg-cell" title="${esc(r.user_message)}">${esc(r.user_message)}</td>
                <td class="msg-cell" title="${esc(r.detail)}">${esc(r.detail || '-')}</td>
                <td style="white-space:nowrap">${esc(r.created_at ? r.created_at.replace('T', ' ').slice(0, 16) : '-')}</td>
                <td>
                  <button class="delete-btn" data-req-id="${esc(r.id)}">삭제</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      document.getElementById('unsupportedContent').innerHTML = html;

      document.getElementById('unsupportedContent').addEventListener('click', function(e) {
        const btn = e.target.closest('.delete-btn[data-req-id]');
        if (btn) deleteUnsupported(Number(btn.dataset.reqId));
      });
    }

    async function deleteUnsupported(id) {
      try {
        const res = await fetch(`${BASE}/admin/unsupported-requests/${id}`, {
          method: 'DELETE', credentials: 'same-origin'
        });
        const data = await res.json();
        if (res.ok) { showToast('삭제 완료'); loadUnsupported(); }
        else showToast(data.detail || '삭제 실패', true);
      } catch (e) { showToast('서버 오류', true); }
    }

    document.getElementById('clearAllBtn').addEventListener('click', async function() {
      if (!confirm('미지원 요청 전체를 삭제하시겠습니까?')) return;
      try {
        const res = await fetch(`${BASE}/admin/unsupported-requests`, { credentials: 'same-origin' });
        const data = await res.json();
        const ids = (data.items || []).map(r => r.id);
        await Promise.all(ids.map(id =>
          fetch(`${BASE}/admin/unsupported-requests/${id}`, { method: 'DELETE', credentials: 'same-origin' })
        ));
        showToast(`${ids.length}건 삭제 완료`);
        loadUnsupported();
      } catch (e) { showToast('서버 오류', true); }
    });

    // ── 트래픽 탭 ──
    async function loadTraffic() {
      document.getElementById('trafficContent').innerHTML = '<div class="loading">불러오는 중...</div>';
      document.getElementById('tunnelCards').innerHTML = '';
      document.getElementById('trafficSummary').innerHTML = '';
      try {
        const res = await fetch(`${BASE}/admin/ngrok-traffic`, { credentials: 'same-origin' });
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        renderTraffic(data);
      } catch (e) {
        document.getElementById('trafficContent').innerHTML =
          `<div class="loading" style="color:#ff6b6b;">ngrok 연결 실패 — ngrok이 실행 중인지 확인하세요.<br><small>${esc(String(e))}</small></div>`;
      }
    }

    function fmtBytes(b) {
      if (b === 0) return '0 B';
      if (b < 1024) return b + ' B';
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
      return (b / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function fmtTime(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return d.toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' }) + ' ' +
             d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function statusClass(s) {
      if (s >= 500) return 'status-5xx';
      if (s >= 400) return 'status-4xx';
      if (s >= 300) return 'status-3xx';
      if (s >= 200) return 'status-2xx';
      return '';
    }

    function renderTraffic(data) {
      // 메타 행
      document.getElementById('trafficMeta').innerHTML = `
        <span>최근 요청 <strong>${data.total_requests}</strong>건</span>
        <button class="refresh-btn" id="trafficRefreshBtn">새로고침</button>
      `;
      document.getElementById('trafficRefreshBtn').addEventListener('click', loadTraffic);

      // 터널 카드
      const tunnelHtml = data.tunnels.length === 0
        ? '<div class="tunnel-card"><div class="tunnel-meta">활성 터널 없음</div></div>'
        : data.tunnels.map(t => `
          <div class="tunnel-card">
            <div class="tunnel-meta" style="margin-bottom:4px">
              <span class="tunnel-online">● 온라인</span>
            </div>
            <div class="tunnel-url">${esc(t.public_url)}</div>
            <div class="tunnel-meta">
              ${esc(t.proto.toUpperCase())} → ${esc(t.addr)} &nbsp;|&nbsp;
              총 연결 ${t.conn_count}회 &nbsp;|&nbsp; HTTP 요청 ${t.http_count}회
            </div>
          </div>
        `).join('');
      document.getElementById('tunnelCards').innerHTML = tunnelHtml;

      // 요약 카드
      const total = data.total_requests;
      const ok = data.requests.filter(r => r.status >= 200 && r.status < 300).length;
      const err = data.requests.filter(r => r.status >= 400).length;
      const avgMs = total > 0
        ? Math.round(data.requests.reduce((s, r) => s + r.duration_ms, 0) / total)
        : 0;
      document.getElementById('trafficSummary').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">총 요청</div>
          <div class="stat-value">${total}</div>
          <div class="stat-sub">최근 기록 기준</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">성공 (2xx)</div>
          <div class="stat-value" style="color:#4caf50">${ok}</div>
          <div class="stat-sub">${total > 0 ? Math.round(ok/total*100) : 0}%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">에러 (4xx+5xx)</div>
          <div class="stat-value" style="color:#ff6b6b">${err}</div>
          <div class="stat-sub">${total > 0 ? Math.round(err/total*100) : 0}%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">평균 응답시간</div>
          <div class="stat-value">${avgMs}</div>
          <div class="stat-sub">ms</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">전송 데이터</div>
          <div class="stat-value">${fmtBytes(data.total_bytes)}</div>
          <div class="stat-sub">응답 기준</div>
        </div>
      `;

      // 요청 목록
      if (!data.requests.length) {
        document.getElementById('trafficContent').innerHTML =
          '<div class="loading">아직 외부 요청이 없습니다.</div>';
        return;
      }
      const rows = data.requests.map(r => `
        <tr>
          <td style="white-space:nowrap;color:var(--text-muted)">${esc(fmtTime(r.start))}</td>
          <td><strong>${esc(r.method)}</strong></td>
          <td class="msg-cell" title="${esc(r.uri)}">${esc(r.uri)}</td>
          <td class="${statusClass(r.status)}">${r.status || '-'}</td>
          <td style="text-align:right">${r.duration_ms} ms</td>
          <td style="text-align:right">${fmtBytes(r.bytes)}</td>
          <td style="color:var(--text-muted);font-size:12px">${esc(r.remote_addr)}</td>
        </tr>
      `).join('');
      document.getElementById('trafficContent').innerHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th>시간</th>
              <th>메서드</th>
              <th>경로</th>
              <th>상태</th>
              <th style="text-align:right">응답시간</th>
              <th style="text-align:right">크기</th>
              <th>IP</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // ── 공통 토스트 ──
    function showToast(msg, isError = false) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const el = document.createElement('div');
      el.className = `toast${isError ? ' error' : ''}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    loadUsers();
  </script>
</body>
</html>

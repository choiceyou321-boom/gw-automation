<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GW 자동화 챗봇</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- 로그인/회원가입 화면 -->
  <div class="auth-container" id="authContainer">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">&#9881;</span>
        <span class="logo-text">GW 자동화</span>
      </div>

      <!-- 탭 전환 -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" id="loginTab">로그인</button>
        <button class="auth-tab" data-tab="register" id="registerTab">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="loginId">GW 아이디</label>
          <input type="text" id="loginId" placeholder="그룹웨어 아이디" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="loginPw">GW 비밀번호</label>
          <input type="password" id="loginPw" placeholder="그룹웨어 비밀번호" required autocomplete="current-password" />
        </div>
        <div class="auth-error" id="loginError"></div>
        <button type="submit" class="auth-submit-btn">로그인</button>
      </form>

      <!-- 회원가입 폼 -->
      <form class="auth-form" id="registerForm" style="display:none;">
        <div class="form-group">
          <label for="regName">이름</label>
          <input type="text" id="regName" placeholder="이름 (예: 홍길동)" required />
        </div>
        <div class="form-group">
          <label for="regPosition">직급</label>
          <input type="text" id="regPosition" placeholder="직급 (예: 대리, 과장)" />
        </div>
        <div class="form-group">
          <label for="regId">GW 아이디</label>
          <input type="text" id="regId" placeholder="그룹웨어 아이디" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="regPw">GW 비밀번호</label>
          <input type="password" id="regPw" placeholder="그룹웨어 비밀번호" required autocomplete="new-password" />
        </div>
        <div class="auth-error" id="registerError"></div>
        <button type="submit" class="auth-submit-btn">회원가입</button>
      </form>
    </div>
  </div>

  <!-- 메인 앱 (로그인 후) -->
  <div class="app" id="mainApp" style="display:none;">
    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">&#9881;</span>
          <span class="logo-text">GW 자동화</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn" title="새 대화">
          <span>+</span> 새 대화
        </button>
      </div>
      <div class="quick-actions">
        <p class="quick-label">빠른 실행</p>
        <button class="quick-btn" data-msg="회의실 예약해줘">
          <span class="quick-icon">&#128197;</span> 회의실 예약
        </button>
        <button class="quick-btn" data-msg="지출결의서 작성해줘">
          <span class="quick-icon">&#128181;</span> 지출결의서
        </button>
        <button class="quick-btn" data-msg="거래처등록 신청해줘">
          <span class="quick-icon">&#128196;</span> 거래처등록
        </button>
        <button class="quick-btn" data-msg="연장근무 신청해줘">
          <span class="quick-icon">&#128336;</span> 연장근무
        </button>
        <button class="quick-btn" data-msg="외근신청서 작성해줘">
          <span class="quick-icon">&#128694;</span> 외근신청
        </button>
        <a href="/fund" class="quick-btn" style="text-decoration:none; text-align:center;">
          <span class="quick-icon">&#128202;</span> 자금관리표
        </a>
      </div>
      <!-- 이전 대화 목록 -->
      <div class="chat-history" id="chatHistory">
        <p class="quick-label">이전 대화</p>
        <div class="history-list" id="historyList">
          <!-- JS로 동적 생성 -->
        </div>
      </div>
      <div class="sidebar-footer">
        <p class="model-info">Gemini 2.5 Flash</p>
      </div>
    </aside>

    <!-- 메인 채팅 영역 -->
    <main class="chat-area">
      <!-- 헤더 -->
      <header class="chat-header">
        <button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>
        <h1 class="chat-title">업무 자동화 어시스턴트</h1>
        <div class="header-user" id="headerUser">
          <span class="user-name" id="userName"></span>
          <a href="/admin" class="admin-link" id="adminLink" style="display:none;" title="사용자 관리">관리</a>
          <button class="logout-btn" id="logoutBtn" title="로그아웃">로그아웃</button>
        </div>
        <button class="clear-btn" id="clearBtn" title="대화 초기화">&#128465;</button>
      </header>

      <!-- 메시지 목록 -->
      <div class="messages" id="messages">
        <!-- 환영 메시지 -->
        <div class="message bot">
          <div class="avatar bot-avatar">AI</div>
          <div class="bubble">
            <p>안녕하세요! GW 자동화 어시스턴트입니다.</p>
            <p>회의실 예약, 전자결재, 외근/연장근무 신청 등 업무 자동화를 도와드립니다.</p>
            <p>왼쪽 빠른 실행 버튼을 누르거나 직접 요청해 보세요.</p>
          </div>
        </div>
      </div>

      <!-- 파일 첨부 미리보기 -->
      <div class="attachments-preview" id="attachmentsPreview" style="display:none;">
        <div class="attachments-list" id="attachmentsList"></div>
      </div>

      <!-- 드래그앤드랍 + 입력 영역 -->
      <div class="input-area" id="inputArea">
        <div class="drop-overlay" id="dropOverlay">
          <div class="drop-message">
            <span class="drop-icon">&#128206;</span>
            <p>파일을 여기에 놓으세요</p>
            <p class="drop-sub">JPG, PNG, PDF, XLSX, MP3, WAV, M4A 지원 (최대 20MB)</p>
          </div>
        </div>

        <div class="input-container">
          <button class="attach-btn" id="attachBtn" title="파일 첨부">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <input type="file" id="fileInput" accept="image/*,.pdf,.xlsx,.mp3,.wav,.m4a,.ogg,.flac,.webm" multiple style="display:none;" />

          <textarea
            id="messageInput"
            class="message-input"
            placeholder="메시지를 입력하세요... (Shift+Enter: 줄바꿈)"
            rows="1"
          ></textarea>

          <button class="send-btn" id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
